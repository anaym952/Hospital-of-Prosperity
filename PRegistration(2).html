</head>

<body>
    
    <div class="navbar">
        <div class="icon">
            <a href="home.html"><i class='bx bx-shield-plus'></i></a>
        </div>
        <div class="options">
            <ul>
                <a href="PRegistration(2).html"><li>Register Patient</li></a>

            </ul>
        </div>

    <div class="form_container">
        <div class="form">
            <form>
                <label for="name">Name:</label>
                <input type="text">
                <br>
                <label for="age">Age:</label>
                <input type="number">
                <br>
                <label for="gender">Gender:</label>
                <input type="radio">Male
                <input type="radio">Female
                <br>
                <label for="phone_number">Phone Number:</label>
                <input type="number">
                <br>
                <label for="medical_history">Have you had any medical issues before?</label>
                <input type="radio">Yes
                <input type="radio">No
                <br>
                <label for="initial_deposit">Initial Deposit of Money:</label>
                <input type="number">
                <br>
                <label for="password">Password (at least one non-digit character):</label>
                <input type="password">
                <br>
                <button type="submit" class="button">Register</button>
            </form>
        </div>
    </div>

    <div class="footer">
